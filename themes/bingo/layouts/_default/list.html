{{ define "main" }}
<main id="list">
    <h1>{{ .Section }}</h1>
    <ul>
        {{ range .Data.Pages.ByDate.Reverse}}
        <li>
            <span>{{- partial "date.html" . -}}</span>| &nbsp; <a href="{{ .Permalink }}">{{ .Title }}</a>
        </li>
        {{ end }}
    </ul>
    <p>{{ .Data.Pages.Len }} items.</p>
</main>
{{ end }}
